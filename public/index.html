<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>good-dog 🐶</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>🐶 good-dog</h1>
    <nav class="tab-nav" role="tablist">
      <button role="tab" data-tab="live"       class="tab-btn active" aria-selected="true">📹 Live</button>
      <button role="tab" data-tab="events"     class="tab-btn"        aria-selected="false">🔔 Events</button>
      <button role="tab" data-tab="recordings" class="tab-btn"        aria-selected="false">📼 Recordings</button>
      <button role="tab" data-tab="settings"   class="tab-btn"        aria-selected="false">⚙️ Settings</button>
    </nav>
    <div class="status-dot" id="ws-status" title="WebSocket disconnected"></div>
  </header>

  <main class="tab-content">
    <section id="tab-live"       class="tab-panel active"  role="tabpanel"><live-feed></live-feed></section>
    <section id="tab-events"     class="tab-panel"         role="tabpanel"><event-list></event-list></section>
    <section id="tab-recordings" class="tab-panel"         role="tabpanel"><recordings-browser></recordings-browser></section>
    <section id="tab-settings"   class="tab-panel"         role="tabpanel"><config-panel></config-panel></section>
  </main>

  <script type="module" src="/app.js"></script>
  <script type="module" src="/components/live-feed.js"></script>
  <script type="module" src="/components/event-list.js"></script>
  <script type="module" src="/components/event-player.js"></script>
  <script type="module" src="/components/recordings-browser.js"></script>
  <script type="module" src="/components/config-panel.js"></script>
</body>
</html>
